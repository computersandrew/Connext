version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: connext
      POSTGRES_USER: connext
      POSTGRES_PASSWORD: connext
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./infrastructure/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-ARGS", "pg_isready", "-U", "connext"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  redis-data:
  pg-data:
